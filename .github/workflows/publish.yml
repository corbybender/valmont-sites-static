name: Publish container

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  ACR_LOGIN_SERVER: cwsstagestaticsitesacr.azurecr.io
  ACR_IMAGE_NAME: valmont-tubing
  AZURE_WEB_APP_NAME: valmont-cws-stage-staticsites

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/cmt-poles:latest
            ${{ env.ACR_LOGIN_SERVER }}/cmt-poles:${{ github.sha }}

  update-web-app:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy image to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEB_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:${{ github.sha }}
