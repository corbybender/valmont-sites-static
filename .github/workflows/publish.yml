name: Publish container

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  ACR_LOGIN_SERVER: cwsstagestaticsitesacr.azurecr.io
  ACR_IMAGE_NAME: valmont-tubing
  AZURE_WEB_APP_NAME: valmont-cws-stage-staticsites

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/cmt-poles:latest
            ${{ env.ACR_LOGIN_SERVER }}/cmt-poles:${{ github.sha }}

  update-web-app:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Point App Service at the exact image tag
        env:
          PUBLISH_PROFILE_XML: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          IMAGE: ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:${{ github.sha }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import sys
          import urllib.request
          import xml.etree.ElementTree as ET

          xml = os.environ["PUBLISH_PROFILE_XML"]
          root = ET.fromstring(xml)
          profile = None
          for node in root.findall(".//publishProfile"):
            if node.attrib.get("publishMethod") == "ZipDeploy":
              profile = node
              break

          if profile is None:
            raise SystemExit("ZipDeploy publish profile not found")

          publish_url = profile.attrib["publishUrl"].replace(":443", "")
          user = profile.attrib["userName"]
          pwd = profile.attrib["userPWD"]
          auth = base64.b64encode(f"{user}:{pwd}".encode("utf-8")).decode("ascii")

          settings = {
              "DOCKER_CUSTOM_IMAGE_NAME": f"DOCKER|{os.environ['IMAGE']}",
              "DOCKER_ENABLE_CI": "false",
          }

          req = urllib.request.Request(
              f"https://{publish_url}/api/settings",
              data=json.dumps(settings).encode("utf-8"),
              method="POST",
              headers={
                  "Authorization": f"Basic {auth}",
                  "Content-Type": "application/json",
              },
          )

          with urllib.request.urlopen(req, timeout=60) as resp:
              print(resp.status)
              print(resp.read().decode("utf-8"))
          PY
