name: Publish container

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  ACR_LOGIN_SERVER: cwsstagestaticsitesacr.azurecr.io
  ACR_IMAGE_NAME: valmont-tubing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to ACR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:latest
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_LOGIN_SERVER }}/cmt-poles:latest
            ${{ env.ACR_LOGIN_SERVER }}/cmt-poles:${{ github.sha }}
