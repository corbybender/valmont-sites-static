# nginx site config for Valmont Tubing static mirror
#
# Prerequisites:
#   - nginx with http_ssi_module enabled (default on most builds)
#   - Node form relay running: npm run forms  (listens on 127.0.0.1:8787)
#
# Install:
#   1. Copy this file to /etc/nginx/sites-available/valmont-tubing
#   2. Set root below to your deployed site path
#   3. ln -s /etc/nginx/sites-available/valmont-tubing /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx
#
# Local test (from repo root, with nginx installed):
#   npm run forms &
#   nginx -p "$(pwd)/deploy/nginx-test" -c "$(pwd)/deploy/nginx.conf"

upstream valmont_form_relay {
    server 127.0.0.1:8787;
    keepalive 8;
}

server {
    listen 80;
    server_name localhost valmonttubing.local;

    # Production deploy path:
    root /var/www/valmont-tubing;
    # Local WSL/repo test — use your absolute repo path instead:
    # root /mnt/q/payload/nopayload;
    index home.html;

    include url-redirects.nginx.conf;

    # Process <!--#include virtual="..." --> in .html files
    ssi on;
    ssi_silent_errors off;

    # Form POSTs → Node Proofpoint relay (same URL path the HTML forms use)
    location = /api/send-form {
        proxy_pass http://valmont_form_relay;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Include fragments are only used by SSI subrequests, not direct browser access
    location ^~ /shared/ {
        internal;
    }

    # Extensionless URLs: /about-us → /about-us.html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Optional: cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|ico|woff2?|ttf|pdf)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
