form#Form1 {
    padding: 0;
    margin: 0;
}

ul.website-select-list li a {  text-decoration: none;  color: #fff;  float: left;  width: 100%;  margin: 2px 0; }

body {
    line-height: normal;
    font-family: 'Roboto', sans-serif !important;
}



  
.select ul li a, .select ul li a:hover, .select ul li a:visited, .select ul li a:focus{
text-decoration: none;
    font-size: 15px;
    color: #3c4242;
    font-weight: 300;
    cursor: pointer;
}
.header-sec-1 .global p a, .header-sec-1 .global p a:hover, .header-sec-1 .global p a:visited, .header-sec-1 .global p a:focus {
    font-size: 12px;
    text-decoration: none;
    color: #323232;
}

.footer-sec-2 .footer-column p a, .footer-sec-2 .footer-column p a:hover, .footer-sec-2 .footer-column p a:visited, .footer-sec-2 .footer-column p a:focus {
    float: left;
    color: #e9ecec;
    font-weight: 300;
    font-size: 12px;
    text-decoration: none;
}

.footer-sec-1 ul.footer-column-list li a, .footer-sec-1 ul.footer-column-list li a:hover, .footer-sec-1 ul.footer-column-list li a:visited, .footer-sec-1 ul.footer-column-list li a:focus{

    color: #e9ecec;
    font-weight: 300;
    font-size: 14px;

    margin: 7px 0 0 0;
}
